<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="ARIA - AI Resource & Intelligence Assistant. Your intelligent workspace assistant for file management, app launching, and system tasks." />
    <meta name="theme-color" content="#0a0a0f" />
    <title>ARIA - AI Assistant</title>
    <style>
      /* Critical CSS for fast initial render */
      body {
        margin: 0;
        background-color: #0a0a0f;
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
      }
      #root {
        width: 100%;
        height: 100vh;
      }
      /* Loading spinner */
      .initial-loader {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0a0a0f;
      }
      .loader-icon {
        width: 48px;
        height: 48px;
        background: linear-gradient(135deg, #a78bfa 0%, #7c3aed 100%);
        border-radius: 12px;
        animation: pulse 1.5s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 0.8; }
        50% { transform: scale(1.1); opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="initial-loader">
        <div class="loader-icon"></div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
